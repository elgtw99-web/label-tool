<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化妝品中文標籤生成器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;700&display=swap');

  :root {
    --cream: #f5f0e8;
    --ink: #1a1410;
    --warm-gray: #8a7f72;
    --accent: #c8793a;
    --accent-light: #e8c9a0;
    --paper: #faf7f2;
    --border: #d4c9b8;
    --success: #4a7c59;
    --warning: #b85c38;
    --label-bg: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif TC', serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* === HEADER === */
  header {
    background: var(--ink);
    color: var(--cream);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--accent);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    letter-spacing: 0.02em;
  }

  header h1 span {
    color: var(--accent);
    font-size: 0.75rem;
    display: block;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.15em;
    margin-top: 2px;
  }

  .header-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    background: var(--accent);
    color: white;
    padding: 4px 10px;
    border-radius: 2px;
    letter-spacing: 0.1em;
  }

  /* === MAIN LAYOUT === */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 30px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    align-items: start;
  }

  /* === LEFT PANEL === */
  .left-panel { display: flex; flex-direction: column; gap: 24px; }

  .panel-title {
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.2em;
    color: var(--warm-gray);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* === UPLOAD AREA === */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 4px;
    padding: 40px 20px;
    text-align: center;
    background: var(--paper);
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: #fdf5ec;
  }

  .upload-zone input {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-icon {
    width: 48px; height: 48px;
    margin: 0 auto 16px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    font-size: 1.4rem;
  }

  .upload-zone h3 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .upload-zone p {
    font-size: 0.78rem;
    color: var(--warm-gray);
    font-family: 'DM Mono', monospace;
  }

  .format-tags {
    display: flex; gap: 8px; justify-content: center; margin-top: 14px;
  }

  .tag {
    font-size: 0.6rem;
    font-family: 'DM Mono', monospace;
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--warm-gray);
    letter-spacing: 0.1em;
  }

  /* === PRODUCT INFO FORM === */
  .form-section {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group label {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    color: var(--warm-gray);
  }

  .form-group input, .form-group select, .form-group textarea {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.88rem;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: white;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent);
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* === INGREDIENT EDITOR === */
  .ingredient-editor {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
  }

  .ingredient-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; max-height: 320px; overflow-y: auto; }

  .ingredient-item {
    display: grid;
    grid-template-columns: 1fr 80px 80px 32px;
    gap: 8px;
    align-items: center;
    padding: 8px 10px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 3px;
    transition: border-color 0.2s;
  }

  .ingredient-item:hover { border-color: var(--accent-light); }

  .ingredient-item.regulated { border-left: 3px solid var(--warning); }

  .ingredient-item input {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 2px;
    outline: none;
    width: 100%;
    background: var(--paper);
  }

  .ingredient-item input:focus { border-color: var(--accent); background: white; }

  .badge-regulated {
    font-size: 0.55rem;
    font-family: 'DM Mono', monospace;
    background: var(--warning);
    color: white;
    padding: 2px 5px;
    border-radius: 2px;
    white-space: nowrap;
  }

  .remove-btn {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
    color: var(--warm-gray);
    transition: all 0.2s;
  }

  .remove-btn:hover { background: #fde8e8; border-color: #e88; color: #c44; }

  .add-ingredient-btn {
    margin-top: 10px;
    padding: 8px 16px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--warm-gray);
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    letter-spacing: 0.08em;
  }

  .add-ingredient-btn:hover { border-color: var(--accent); color: var(--accent); background: #fdf5ec; }

  /* === GENERATE BUTTON === */
  .generate-btn {
    padding: 14px 28px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-transform: uppercase;
  }

  .generate-btn:hover { background: var(--accent); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* === STATUS === */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
  }

  .status-bar.loading { background: #f0f4ff; border: 1px solid #c0ccee; color: #446; }
  .status-bar.success { background: #f0faf4; border: 1px solid #a0d4b4; color: #2a5a3a; }
  .status-bar.error { background: #fdf0f0; border: 1px solid #e0b0b0; color: #8a2a2a; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* === RIGHT PANEL — LABEL PREVIEW === */
  .right-panel {
    position: sticky;
    top: 30px;
  }

  .preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .preview-actions { display: flex; gap: 8px; }

  .action-btn {
    padding: 7px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .action-btn.outline {
    border: 1px solid var(--border);
    background: none;
    color: var(--warm-gray);
  }
  .action-btn.outline:hover { border-color: var(--ink); color: var(--ink); }

  .action-btn.filled {
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--cream);
  }
  .action-btn.filled:hover { background: var(--accent); border-color: var(--accent); }

  /* === LABEL CARD === */
  .label-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    min-height: 300px;
  }

  /* === ACTUAL LABEL INSIDE === */
  .label-content {
    border: 1px solid #999;
    padding: 14px 16px;
    font-family: 'Noto Serif TC', serif;
    font-size: 12px;
    line-height: 1.65;
    color: #111;
    background: white;
    max-width: 380px;
    margin: 0 auto;
  }

  .label-product-name {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .label-row {
    display: flex;
    gap: 4px;
    margin-bottom: 3px;
  }

  .label-key {
    white-space: nowrap;
    font-weight: 600;
    flex-shrink: 0;
  }

  .label-value {
    word-break: break-all;
  }

  .label-divider {
    border: none;
    border-top: 1px solid #ccc;
    margin: 8px 0;
  }

  .regulated-mark {
    color: #8a2a00;
    font-weight: 600;
  }

  /* === EMPTY STATE === */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 320px;
    gap: 14px;
    color: var(--warm-gray);
  }

  .empty-icon {
    width: 60px; height: 60px;
    border: 2px dashed var(--border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
  }

  .empty-state p {
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    text-align: center;
  }

  /* === PRINT STYLES === */
  @media print {
    body { background: white; }
    header, .left-panel, .preview-header { display: none; }
    .right-panel { position: static; }
    .label-card { border: none; box-shadow: none; padding: 0; }
    .container { grid-template-columns: 1fr; }
  }

  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
    .right-panel { position: static; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>
    化妝品標籤生成系統
    <span>COSMETIC LABEL GENERATOR · TW COMPLIANT</span>
  </h1>
  <span class="header-badge">衛福部規範版 v1.0</span>
</header>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="left-panel">

    <!-- STEP 1: Upload -->
    <div>
      <div class="panel-title">步驟 01 — 上傳配方表</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.jpg,.jpeg,.png,.webp" multiple>
        <div class="upload-icon">📋</div>
        <h3>上傳產品配方表</h3>
        <p>拖曳檔案至此，或點擊選擇</p>
        <div class="format-tags">
          <span class="tag">XLSX / XLS</span>
          <span class="tag">CSV</span>
          <span class="tag">JPG / PNG</span>
        </div>
      </div>
    </div>

    <!-- STATUS -->
    <div id="statusBar" style="display:none"></div>

    <!-- STEP 2: Product Info -->
    <div>
      <div class="panel-title">步驟 02 — 產品基本資訊</div>
      <div class="form-section">
        <div class="form-group">
          <label>產品名稱（中文）</label>
          <input type="text" id="productName" placeholder="例：水潤保濕面膜" value="水潤保濕面膜">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>內容量</label>
            <input type="text" id="netContent" placeholder="例：25g/片" value="25g/片">
          </div>
          <div class="form-group">
            <label>有效期間</label>
            <input type="text" id="shelfLife" placeholder="例：三年" value="三年">
          </div>
        </div>
        <div class="form-group">
          <label>用途</label>
          <input type="text" id="usage" placeholder="例：保濕鎖水，舒緩肌膚乾燥" value="保濕鎖水，舒緩肌膚乾燥，使肌膚留住水分">
        </div>
        <div class="form-group">
          <label>用法</label>
          <textarea id="directions" rows="2" placeholder="例：潔面後將面膜取出，貼於臉部，15-20分鐘後取下...">潔面後將面膜取出，貼於臉部，15-20分鐘後取下，輕拍臉部可幫助精華吸收</textarea>
        </div>
        <div class="form-group">
          <label>保存方法</label>
          <input type="text" id="storage" value="避免放置於陽光直射、高溫或潮濕之場所">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>原產地</label>
            <input type="text" id="origin" value="台灣">
          </div>
          <div class="form-group">
            <label>保存期限及批號</label>
            <input type="text" id="expiry" value="標示於包裝上">
          </div>
        </div>
        <div class="form-group">
          <label>製造業者名稱</label>
          <input type="text" id="mfrName" value="依洛嘉國際實業有限公司">
        </div>
        <div class="form-group">
          <label>製造業者地址</label>
          <input type="text" id="mfrAddr" value="台南市佳里區佳興里宅興二街600號">
        </div>
        <div class="form-group">
          <label>製造業者電話</label>
          <input type="text" id="mfrTel" value="06-7266551">
        </div>
        <div class="form-group">
          <label>使用注意事項</label>
          <textarea id="warnings" rows="2">敏感肌膚請先做局部測試，如有不適請立即停止使用並洽詢專業醫師</textarea>
        </div>
      </div>
    </div>

    <!-- STEP 3: Ingredient Editor -->
    <div>
      <div class="panel-title">步驟 03 — 全成分編輯（已按濃度排序）</div>
      <div class="ingredient-editor">
        <div style="font-size:0.75rem; color:var(--warm-gray); font-family:'DM Mono',monospace; line-height:1.6;">
          ⚠ 橘色左框 = 衛福部限量成分，須標示含量<br>
          上傳配方後自動填入；亦可手動編輯或新增
        </div>
        <div class="ingredient-list" id="ingredientList">
          <!-- Populated by JS -->
        </div>
        <button class="add-ingredient-btn" onclick="addIngredient()">＋ 新增成分</button>
      </div>
    </div>

    <!-- GENERATE -->
    <button class="generate-btn" id="generateBtn" onclick="generateLabel()">
      <span>✦</span> 生成標籤預覽
    </button>

  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="preview-header">
      <div class="panel-title">標籤預覽</div>
      <div class="preview-actions">
        <button class="action-btn outline" onclick="copyLabel()">複製文字</button>
        <button class="action-btn filled" onclick="window.print()">列印 / 匯出</button>
      </div>
    </div>
    <div class="label-card" id="labelCard">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🏷</div>
        <p>上傳配方表並填寫<br>產品資訊後，點擊<br>「生成標籤預覽」</p>
      </div>
      <div id="labelOutput" style="display:none"></div>
    </div>
  </div>

</div>

<script>
// ============================================================
// REGULATED INGREDIENTS (Taiwan 衛福部 限量成分)
// ============================================================
const REGULATED = {
  // Preservatives
  'phenoxyethanol': { limit: '1.0%', label: '苯氧乙醇' },
  'methylparaben': { limit: '0.4%', label: '對羥基苯甲酸甲酯' },
  'propylparaben': { limit: '0.14%', label: '對羥基苯甲酸丙酯' },
  'butylparaben': { limit: '0.14%', label: '對羥基苯甲酸丁酯' },
  'ethylparaben': { limit: '0.4%', label: '對羥基苯甲酸乙酯' },
  'chlorphenesin': { limit: '0.3%', label: '氯苯甘油醚' },
  'benzyl alcohol': { limit: '1.0%', label: '苯甲醇' },
  'dehydroacetic acid': { limit: '0.6%', label: '去氫醋酸' },
  'salicylic acid': { limit: '2.0%', label: '水楊酸' },
  'sorbic acid': { limit: '0.6%', label: '山梨酸' },
  'imidazolidinyl urea': { limit: '0.6%', label: '咪唑烷基尿素' },
  'dmdm hydantoin': { limit: '0.6%', label: 'DMDM乙內醯脲' },
  'sodium benzoate': { limit: '0.5%', label: '苯甲酸鈉' },
  'potassium sorbate': { limit: '0.6%', label: '山梨酸鉀' },
  'formaldehyde': { limit: '0.2%', label: '甲醛' },
  'chlorhexidine': { limit: '0.3%', label: '氯己定' },
  'triclosan': { limit: '0.3%', label: '三氯沙' },
  'benzalkonium chloride': { limit: '0.1%', label: '苯紮氯銨' },
  // UV filters
  'titanium dioxide': { limit: '25%', label: '二氧化鈦' },
  'zinc oxide': { limit: '25%', label: '氧化鋅' },
  'benzophenone-3': { limit: '6.0%', label: '二苯甲酮-3' },
  'homosalate': { limit: '10%', label: '胡莫柳酯' },
  'octinoxate': { limit: '7.5%', label: '甲氧肉桂酸乙基己酯' },
  'avobenzone': { limit: '3.0%', label: '阿伏苯宗' },
  // Others
  'hydroquinone': { limit: '2.0%', label: '對苯二酚' },
  'kojic acid': { limit: '2.0%', label: '麴酸' },
  'resorcinol': { limit: '0.5%', label: '間苯二酚' },
  'allantoin': { limit: '2.0%', label: '尿囊素' },
  'retinol': { limit: '0.3%', label: '視黃醇' },
  'alpha arbutin': { limit: '2.0%', label: 'α-熊果苷' },
  'niacinamide': { limit: '5.0%', label: '菸鹼醯胺' },
};

function checkRegulated(name) {
  const lower = name.toLowerCase().trim();
  for (const [key, val] of Object.entries(REGULATED)) {
    if (lower.includes(key) || key.includes(lower.replace(/\s+/g,''))) {
      return val;
    }
  }
  return null;
}

// ============================================================
// INGREDIENT STATE
// ============================================================
let ingredients = [];

function renderIngredientList() {
  const list = document.getElementById('ingredientList');
  list.innerHTML = '';
  ingredients.forEach((ing, i) => {
    const reg = checkRegulated(ing.inci);
    const item = document.createElement('div');
    item.className = 'ingredient-item' + (reg ? ' regulated' : '');
    item.innerHTML = `
      <input type="text" value="${escHtml(ing.inci)}" placeholder="INCI名稱"
        oninput="ingredients[${i}].inci=this.value;updateRegBadge(this,${i})">
      <input type="number" value="${ing.pct || ''}" placeholder="%" step="0.001" min="0" max="100"
        oninput="ingredients[${i}].pct=parseFloat(this.value)||0;sortIngredients()">
      ${reg ? `<span class="badge-regulated">限量 ${reg.limit}</span>` : '<span></span>'}
      <button class="remove-btn" onclick="removeIngredient(${i})" title="移除">×</button>
    `;
    list.appendChild(item);
  });
}

function updateRegBadge(input, i) {
  ingredients[i].inci = input.value;
  renderIngredientList();
}

function addIngredient() {
  ingredients.push({ inci: '', pct: 0 });
  renderIngredientList();
}

function removeIngredient(i) {
  ingredients.splice(i, 1);
  renderIngredientList();
}

function sortIngredients() {
  // Ingredients >= 1% sorted by pct desc; < 1% can be random (regulatory), we still sort them
  // Items with pct === 0 treated as unknown, keep at end
  ingredients.sort((a, b) => {
    const pa = a.pct || 0, pb = b.pct || 0;
    if (pa === 0 && pb === 0) return 0;
    if (pa === 0) return 1;
    if (pb === 0) return -1;
    return pb - pa;
  });
  renderIngredientList();
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// FILE UPLOAD
// ============================================================
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => handleFiles(e.target.files));

async function handleFiles(files) {
  if (!files || files.length === 0) return;
  const file = files[0];
  const ext = file.name.split('.').pop().toLowerCase();

  if (['xlsx', 'xls', 'csv'].includes(ext)) {
    await handleExcel(file);
  } else if (['jpg','jpeg','png','webp','gif'].includes(ext)) {
    await handleImage(file);
  } else {
    showStatus('不支援的檔案格式', 'error');
  }
}

// --- EXCEL ---
async function handleExcel(file) {
  showStatus('讀取 Excel 配方表中…', 'loading');
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

    // Auto-detect columns: look for INCI / ingredient / % / concentration headers
    let inciCol = -1, pctCol = -1;
    if (data.length > 0) {
      const headers = data[0].map(h => String(h).toLowerCase());
      inciCol = headers.findIndex(h => h.includes('inci') || h.includes('ingredient') || h.includes('成分') || h.includes('name'));
      pctCol  = headers.findIndex(h => h.includes('%') || h.includes('pct') || h.includes('percent') || h.includes('比例') || h.includes('濃度') || h.includes('concentration'));
      if (inciCol === -1) inciCol = 0;
      if (pctCol  === -1) pctCol  = 1;
    }

    const parsed = [];
    for (let r = 1; r < data.length; r++) {
      const row = data[r];
      const name = String(row[inciCol] || '').trim();
      if (!name) continue;
      let pct = parseFloat(String(row[pctCol] || '0').replace(/[%\s]/g, '')) || 0;
      parsed.push({ inci: name, pct });
    }

    if (parsed.length === 0) {
      // Try to parse without header row
      data.forEach(row => {
        const name = String(row[0] || '').trim();
        const pct = parseFloat(String(row[1] || '0').replace(/[%\s]/g,'')) || 0;
        if (name && isNaN(parseFloat(name))) parsed.push({ inci: name, pct });
      });
    }

    ingredients = parsed;
    sortIngredients();
    showStatus(`✓ 已讀取 ${parsed.length} 項成分`, 'success');
  } catch(e) {
    showStatus('Excel 讀取失敗，請確認格式是否正確', 'error');
  }
}

// --- IMAGE (send to Claude API) ---
async function handleImage(file) {
  showStatus('正在使用 AI 辨識配方圖片…', 'loading');
  try {
    const base64 = await fileToBase64(file);
    const mediaType = file.type || 'image/jpeg';

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: mediaType, data: base64 }
            },
            {
              type: 'text',
              text: `This is a cosmetic formulation table. Extract all ingredients with their INCI names and percentages.
Return ONLY a JSON array, no markdown, no explanation. Format:
[{"inci":"Aqua","pct":70.5},{"inci":"Glycerin","pct":5.0},...]
If percentage is unknown or not listed, use 0.
Use correct standard INCI names (capitalize first letter of each word).
If you see Chinese ingredient names, translate them to correct INCI.`
            }
          ]
        }]
      })
    });

    const data = await response.json();
    let text = data.content?.map(b => b.text || '').join('') || '';
    text = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(text);
    ingredients = parsed.map(p => ({ inci: p.inci || '', pct: parseFloat(p.pct) || 0 }));
    sortIngredients();
    showStatus(`✓ AI 辨識完成，共 ${parsed.length} 項成分`, 'success');
  } catch(e) {
    showStatus('圖片辨識失敗，請確認圖片清晰度或改用 Excel 上傳。錯誤：' + e.message, 'error');
  }
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('讀取失敗'));
    r.readAsDataURL(file);
  });
}

function showStatus(msg, type) {
  const bar = document.getElementById('statusBar');

}
