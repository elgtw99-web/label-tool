<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>標籤生成系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap');

:root {
  --bg: #0e0e0e;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: #2e2e2e;
  --border-bright: #444;
  --text: #e8e8e8;
  --text-dim: #666;
  --text-muted: #444;
  --accent: #d4f03c;
  --accent-dim: #a8c030;
  --danger: #ff5c3a;
  --label-bg: #ffffff;
  --label-text: #111111;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
header {
  padding: 18px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Bebas Neue', 'Noto Sans TC', sans-serif;
  font-size: 1.25rem;
  letter-spacing: 0.06em;
  color: var(--accent);
}

.logo span {
  color: var(--text-dim);
  font-size: 0.6rem;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.2em;
  display: block;
  margin-top: -4px;
}

.header-tag {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--text-dim);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 2px;
}

/* ── MAIN ── */
main {
  flex: 1;
  display: grid;
  grid-template-columns: 420px 1fr;
  min-height: calc(100vh - 61px);
}

/* ── LEFT: INPUT PANEL ── */
.input-panel {
  border-right: 1px solid var(--border);
  padding: 40px 32px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  overflow-y: auto;
}

.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.22em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* ── UPLOAD ── */
.upload-zone {
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  position: relative;
  transition: all 0.2s;
  background: var(--surface);
}

.upload-zone:hover, .upload-zone.active {
  border-color: var(--accent);
  background: #1a1e0f;
}

.upload-zone input {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}

.upload-icon {
  font-size: 2rem;
  margin-bottom: 10px;
  display: block;
}

.upload-zone h3 {
  font-size: 0.9rem;
  font-weight: 500;
  margin-bottom: 5px;
  color: var(--text);
}

.upload-zone p {
  font-size: 0.72rem;
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
}

.file-formats {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-top: 14px;
  flex-wrap: wrap;
}

.fmt {
  font-size: 0.58rem;
  font-family: 'DM Mono', monospace;
  padding: 3px 8px;
  border: 1px solid var(--border-bright);
  border-radius: 2px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
}

.file-loaded {
  display: none;
  margin-top: 12px;
  padding: 10px 14px;
  background: #1a1e0f;
  border: 1px solid var(--accent-dim);
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--accent);
  text-align: left;
  gap: 8px;
  align-items: center;
}

/* ── INPUTS ── */
.field {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.field label {
  font-size: 0.65rem;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.12em;
  color: var(--text-dim);
}

.field input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 14px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.9rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

.field input:focus {
  border-color: var(--accent);
}

.field input::placeholder {
  color: var(--text-muted);
}

.field-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 14px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.9rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
.field-input:focus { border-color: var(--accent); }
.field-input::placeholder { color: var(--text-muted); }

/* ── MFR TOGGLE ── */
.mfr-toggle {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.mfr-tab {
  flex: 1;
  padding: 9px;
  background: var(--surface);
  border: none;
  color: var(--text-dim);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.04em;
}

.mfr-tab + .mfr-tab { border-left: 1px solid var(--border); }

.mfr-tab.active {
  background: var(--accent);
  color: #0e0e0e;
  font-weight: 600;
}

.mfr-preset-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.mfr-preset-row {
  font-size: 0.78rem;
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.02em;
}

/* ── GENERATE BUTTON ── */
.gen-btn {
  padding: 15px;
  background: var(--accent);
  color: #0e0e0e;
  border: none;
  border-radius: 4px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.gen-btn:hover { background: #e8ff50; }
.gen-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

/* ── STATUS ── */
.status {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
}
.status.loading { background: #141a2a; border: 1px solid #2a3a6a; color: #8aaaff; }
.status.success { background: #101a0a; border: 1px solid var(--accent-dim); color: var(--accent); }
.status.error   { background: #1a0a0a; border: 1px solid #6a2a2a; color: #ff8a8a; }

.spinner {
  width: 13px; height: 13px;
  border: 2px solid currentColor;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RIGHT: PREVIEW PANEL ── */
.preview-panel {
  display: flex;
  flex-direction: column;
  background: #111;
}

.preview-topbar {
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.preview-topbar-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--text-muted);
}

.preview-actions {
  display: flex;
  gap: 8px;
}

.act-btn {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  padding: 6px 14px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}

.act-btn.ghost {
  border: 1px solid var(--border-bright);
  background: none;
  color: var(--text-dim);
}
.act-btn.ghost:hover { border-color: var(--text); color: var(--text); }

.act-btn.solid {
  border: 1px solid var(--accent);
  background: var(--accent);
  color: #0e0e0e;
}
.act-btn.solid:hover { background: #e8ff50; }

.preview-body {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  overflow-y: auto;
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  color: var(--text-muted);
}

.empty-ring {
  width: 80px; height: 80px;
  border: 1px dashed var(--border-bright);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 1.8rem;
  color: var(--border-bright);
}

.empty p {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  line-height: 1.8;
  letter-spacing: 0.08em;
}

/* ── LABEL ── */
.label-wrapper {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  max-width: 480px;
}

.label-sheet {
  background: white;
  color: #111;
  padding: 18px 20px;
  border: 1px solid #bbb;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 11.5px;
  line-height: 1.7;
  width: 100%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}

.label-name {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 8px;
  border-bottom: 1px solid #ddd;
  padding-bottom: 8px;
}

.label-row {
  display: flex;
  margin-bottom: 2px;
  gap: 3px;
}

.lk {
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
  min-width: fit-content;
}

.lv {
  word-break: break-word;
}

.lv .reg {
  color: #8a2200;
  font-weight: 600;
}

.label-divider {
  border: none;
  border-top: 1px solid #e0e0e0;
  margin: 8px 0;
}

.label-footer {
  font-size: 9.5px;
  color: #888;
  margin-top: 8px;
  font-family: 'DM Mono', monospace;
}

/* ── PRINT ── */
@media print {
  body { background: white; }
  header, .input-panel, .preview-topbar { display: none !important; }
  main { grid-template-columns: 1fr; }
  .preview-panel { background: white; }
  .preview-body { padding: 0; }
  .label-wrapper { display: flex !important; }
  .empty { display: none; }
  .label-sheet { box-shadow: none; border: 1px solid #999; }
}

@media (max-width: 800px) {
  main { grid-template-columns: 1fr; }
  .input-panel { border-right: none; border-bottom: 1px solid var(--border); }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    化妝品標籤自動生成系統
    <span>依洛嘉保養品製造工廠 ISO22716 ｜ 版權所有，盜用必揪</span>
  </div>
  <div class="header-tag">TW COMPLIANT · v2.0</div>
</header>

<main>

  <!-- ══ LEFT PANEL ══ -->
  <div class="input-panel">

    <!-- Upload -->
    <div>
      <div class="section-label">01 · 上傳配方表</div>
      <div class="upload-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.jpg,.jpeg,.png,.webp">
        <span class="upload-icon">⬆</span>
        <h3>拖曳或點擊上傳</h3>
        <p>配方表照片 或 Excel 檔案</p>
        <div class="file-formats">
          <span class="fmt">XLSX</span>
          <span class="fmt">XLS</span>
          <span class="fmt">CSV</span>
          <span class="fmt">JPG / PNG</span>
        </div>
      </div>
      <div class="file-loaded" id="fileLoaded">
        <span>✓</span><span id="fileLoadedName"></span>
      </div>
    </div>

    <!-- Product Name -->
    <div>
      <div class="section-label">02 · 產品資訊</div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="field">
          <label>品名（中文）</label>
          <input type="text" id="productName" placeholder="例：水潤保濕面膜">
        </div>
        <div class="field">
          <label>內容量</label>
          <input type="text" id="netContent" placeholder="例：25g/片、30ml">
        </div>
        <!-- Manufacturer Toggle -->
        <div class="field">
          <label>製造業者</label>
          <div class="mfr-toggle">
            <button class="mfr-tab active" id="tabYiLuo" onclick="setMfr('yiluo')">依洛嘉工廠</button>
            <button class="mfr-tab" id="tabCustom" onclick="setMfr('custom')">自訂</button>
          </div>
          <div id="mfrPreset" class="mfr-preset-card">
            <div class="mfr-preset-row">🏭 依洛嘉國際實業有限公司</div>
            <div class="mfr-preset-row">📍 台南市佳里區佳興里宅興二街600號</div>
            <div class="mfr-preset-row">📞 06-7266551</div>
          </div>
          <div id="mfrCustomFields" style="display:none; flex-direction:column; gap:10px;">
            <input type="text" id="mfrName" placeholder="製造業者名稱" class="field-input">
            <input type="text" id="mfrAddr" placeholder="製造業者地址" class="field-input">
            <input type="text" id="mfrTel"  placeholder="製造業者電話" class="field-input">
          </div>
        </div>
      </div>
    </div>

    <!-- Status -->
    <div class="status" id="status"></div>

    <!-- Generate -->
    <button class="gen-btn" id="genBtn" onclick="generate()">
      生成標籤
    </button>

  </div>

  <!-- ══ RIGHT PANEL ══ -->
  <div class="preview-panel">
    <div class="preview-topbar">
      <span class="preview-topbar-label">LABEL PREVIEW · 標籤預覽</span>
      <div class="preview-actions">
        <button class="act-btn ghost" onclick="copyText()">複製文字</button>
        <button class="act-btn solid" onclick="window.print()">列印</button>
      </div>
    </div>

    <div class="preview-body">

      <div class="empty" id="emptyState">
        <div class="empty-ring">🏷</div>
        <p>上傳配方表<br>輸入品名與內容量<br>點擊「生成標籤」</p>
      </div>

      <div class="label-wrapper" id="labelWrapper">
        <div class="label-sheet" id="labelSheet">
          <!-- generated -->
        </div>
      </div>

    </div>
  </div>

</main>

<script>
// ══════════════════════════════════════════
// REGULATED INGREDIENTS (衛福部限量成分)
// ══════════════════════════════════════════
const REGULATED = {
  'phenoxyethanol':       '1.0%',
  'methylparaben':        '0.4%',
  'propylparaben':        '0.14%',
  'butylparaben':         '0.14%',
  'ethylparaben':         '0.4%',
  'chlorphenesin':        '0.3%',
  'benzyl alcohol':       '1.0%',
  'salicylic acid':       '2.0%',
  'sorbic acid':          '0.6%',
  'dehydroacetic acid':   '0.6%',
  'imidazolidinyl urea':  '0.6%',
  'dmdm hydantoin':       '0.6%',
  'sodium benzoate':      '0.5%',
  'potassium sorbate':    '0.6%',
  'triclosan':            '0.3%',
  'allantoin':            '2.0%',
  'titanium dioxide':     '25%',
  'zinc oxide':           '25%',
  'benzophenone-3':       '6.0%',
  'homosalate':           '10%',
  'hydroquinone':         '2.0%',
  'kojic acid':           '2.0%',
  'retinol':              '0.3%',
  'niacinamide':          '5.0%',
  'alpha arbutin':        '2.0%',
  'resorcinol':           '0.5%',
};

function getRegLimit(name) {
  const l = name.toLowerCase().trim();
  for (const [k, v] of Object.entries(REGULATED)) {
    if (l === k || l.includes(k)) return v;
  }
  return null;
}

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let parsedIngredients = []; // [{inci, pct}]
let uploadedImageB64 = null;
let uploadedImageType = null;
let uploadedFileName = '';

// ══════════════════════════════════════════
// FILE HANDLING
// ══════════════════════════════════════════
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('active'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('active'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('active'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

async function handleFile(file) {
  if (!file) return;
  uploadedFileName = file.name;
  const ext = file.name.split('.').pop().toLowerCase();

  if (['xlsx','xls','csv'].includes(ext)) {
    await readExcel(file);
  } else if (['jpg','jpeg','png','webp'].includes(ext)) {
    await readImage(file);
  } else {
    showStatus('不支援的格式，請上傳 Excel 或圖片', 'error');
  }
}

async function readExcel(file) {
  showStatus('讀取 Excel，AI 解析成分中…', 'loading');
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    // Convert to CSV-like text for AI to parse
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    const tableText = rows.map(r => r.join('\t')).join('\n');

    // Send to AI to intelligently parse
    const resp = await fetch('https://labeltool.elg-tw99.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{
          role: 'user',
          content: `以下是化妝品配方表的原始資料（Tab分隔）：

${tableText}

請從中找出所有「原料成分名稱」和「使用百分比（%）」。
規則：
- 忽略數字欄位（如序號、批號）、Total列、成本欄位、空白列
- 成分名稱欄通常是中文原料名或英文名
- 百分比欄通常含有小數數字（如 0.1、5.0、70.0）
- 請將每個成分轉換為正確的國際 INCI 標準名稱（Title Case）
- 中文原料名請翻譯成對應的 INCI 名稱
- 只回傳 JSON array，不要 markdown，不要解釋：
[{"inci":"Aqua","pct":70.0},{"inci":"Glycerin","pct":5.0}]`
        }]
      })
    });

    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    const raw = (data.content || []).map(b => b.text || '').join('');
    const match = raw.match(/\[[\s\S]*\]/);
    if (!match) throw new Error('AI 無法解析此表格，請確認格式');
    const arr = JSON.parse(match[0]);
    const items = arr
      .filter(x => x.inci && String(x.inci).trim())
      .map(x => ({ inci: String(x.inci).trim(), pct: parseFloat(x.pct) || 0 }));

    parsedIngredients = items;
    uploadedImageB64 = null;
    showFileLoaded();
    showStatus(`✓ 讀取完成，共 ${items.length} 項成分`, 'success');
  } catch(e) {
    showStatus('Excel 讀取失敗：' + e.message, 'error');
  }
}

async function readImage(file) {
  showStatus('圖片已載入，生成時將由 AI 辨識', 'success');
  uploadedImageType = file.type || 'image/jpeg';
  uploadedImageB64 = await toB64(file);
  parsedIngredients = [];
  showFileLoaded();
}

function toB64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('讀取失敗'));
    r.readAsDataURL(file);
  });
}

function showFileLoaded() {
  const el = document.getElementById('fileLoaded');
  el.style.display = 'flex';
  document.getElementById('fileLoadedName').textContent = uploadedFileName;
}

// ══════════════════════════════════════════
// STATUS
// ══════════════════════════════════════════
function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.style.display = 'flex';
  el.className = 'status ' + type;
  el.innerHTML = (type === 'loading' ? '<div class="spinner"></div>' : '') + `<span>${msg}</span>`;
}

// ══════════════════════════════════════════
// MANUFACTURER TOGGLE
// ══════════════════════════════════════════
let mfrMode = 'yiluo';

const YILUO = {
  name: '依洛嘉國際實業有限公司',
  addr: '台南市佳里區佳興里宅興二街600號',
  tel:  '06-7266551'
};

function setMfr(mode) {
  mfrMode = mode;
  document.getElementById('tabYiLuo').classList.toggle('active', mode === 'yiluo');
  document.getElementById('tabCustom').classList.toggle('active', mode === 'custom');
  document.getElementById('mfrPreset').style.display       = mode === 'yiluo' ? 'flex' : 'none';
  document.getElementById('mfrCustomFields').style.display = mode === 'custom' ? 'flex' : 'none';
}

function getMfr() {
  if (mfrMode === 'yiluo') return YILUO;
  return {
    name: document.getElementById('mfrName').value.trim(),
    addr: document.getElementById('mfrAddr').value.trim(),
    tel:  document.getElementById('mfrTel').value.trim(),
  };
}

// ══════════════════════════════════════════
// MAIN GENERATE
// ══════════════════════════════════════════
async function generate() {
  const productName = document.getElementById('productName').value.trim();
  const netContent  = document.getElementById('netContent').value.trim();
  const mfr         = getMfr();

  if (!productName) { showStatus('請輸入品名', 'error'); return; }
  if (!netContent)  { showStatus('請輸入內容量', 'error'); return; }
  if (!uploadedImageB64 && parsedIngredients.length === 0) {
    showStatus('請上傳配方表', 'error'); return;
  }

  document.getElementById('genBtn').disabled = true;
  showStatus('AI 正在生成標籤…', 'loading');

  try {
    let ingredients = parsedIngredients;
    if (uploadedImageB64 && ingredients.length === 0) {
      showStatus('AI 辨識圖片中…', 'loading');
      ingredients = await extractIngredientsFromImage();
    }
    ingredients = sortIngredients(ingredients);

    showStatus('AI 生成標籤欄位中…', 'loading');
    const labelData = await generateLabelFields(productName, netContent, ingredients);

    renderLabel(productName, netContent, mfr, ingredients, labelData);
    showStatus('✓ 標籤生成完成', 'success');

  } catch(e) {
    showStatus('生成失敗：' + e.message, 'error');
  } finally {
    document.getElementById('genBtn').disabled = false;
  }
}

// ── Extract ingredients from image via Claude ──
async function extractIngredientsFromImage() {
  const resp = await fetch('https://labeltool.elg-tw99.workers.dev', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: uploadedImageType, data: uploadedImageB64 } },
          { type: 'text', text: `This is a cosmetic formulation table. Extract all ingredients.
Return ONLY a JSON array, no markdown, no extra text:
[{"inci":"Aqua","pct":70.5},{"inci":"Glycerin","pct":5.0}]
Rules:
- Use correct standard INCI names (Title Case)
- Translate any Chinese ingredient names to INCI
- If percentage unknown, use 0
- Include ALL ingredients visible` }
        ]
      }]
    })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  const raw = (data.content || []).map(b => b.text || '').join('');
  const match = raw.match(/\[[\s\S]*\]/);
  if (!match) throw new Error('圖片辨識失敗，請確認圖片清晰度');
  const arr = JSON.parse(match[0]);
  return arr.map(x => ({ inci: String(x.inci || '').trim(), pct: parseFloat(x.pct) || 0 }));
}

// ── Sort: >1% by pct desc, ≤1% any order (we still sort), 0% at end ──
function sortIngredients(arr) {
  const known   = arr.filter(x => x.pct > 0).sort((a,b) => b.pct - a.pct);
  const unknown = arr.filter(x => x.pct === 0);
  return [...known, ...unknown];
}

// ── Generate label fields via Claude ──
async function generateLabelFields(productName, netContent, ingredients) {
  const inciList = ingredients.map(x => x.inci).join(', ');

  const prompt = `你是台灣化妝品衛福部法規專家。
根據以下資訊，生成符合衛福部《化粧品衛生安全管理法》規定的中文標籤欄位。

品名：${productName}
內容量：${netContent}
全成分（INCI）：${inciList}

【重要】用途欄位必須從下列衛福部公告的化妝品用途分類中選擇，不可自創描述：
膚用化粧品類：清潔用、洗面用、化粧水用、乳液用、乳霜用、面膜用、防曬用、美白用、保濕用、去角質用、收斂用
髮用化粧品類：洗髮用、護髮用、染髮用、燙髮用、定型用、生髮用
彩妝品類：粉底用、眼影用、口紅用、腮紅用、睫毛膏用、指甲油用
香水類：香水用、古龍水用
芳香除臭類：除臭用、體香用

請根據品名與成分選擇最適合的用途，可組合 1-3 項，總字數 10-15 字以內，格式例如：「保濕用、美白用」或「洗髮用、護髮用」

僅回傳 JSON，不要 markdown，不要解釋：
{
  "usage": "從上方清單選擇，例：保濕用、面膜用",
  "directions": "用法步驟（根據品名與劑型，具體描述）",
  "storage": "保存方法",
  "shelfLife": "有效期間（如：三年）",
  "expiry": "標示於包裝上",
  "warnings": "使用注意事項（符合衛福部規範）",
  "origin": "台灣"
}`;

  const resp = await fetch('https://labeltool.elg-tw99.workers.dev', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  const raw = (data.content || []).map(b => b.text || '').join('');
  // Extract JSON object from response robustly
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('AI 回傳格式錯誤，請再試一次');
  return JSON.parse(match[0]);
}

// ══════════════════════════════════════════
// RENDER LABEL
// ══════════════════════════════════════════
function renderLabel(productName, netContent, mfr, ingredients, d) {
  // Format: regulated ingredients show actual pct inline e.g. "Allantoin0.1%"
  const inciStr = ingredients.map(ing => {
    const limit = getRegLimit(ing.inci);
    if (limit && ing.pct > 0) {
      const pctStr = ing.pct + '%';
      return esc(ing.inci) + '(' + pctStr + ')';
    }
    return esc(ing.inci);
  }).join('、');

  const html = `
    <div class="label-name">${esc(productName)}</div>
    <div class="label-row"><span class="lk">全成分名稱：</span><span class="lv">${inciStr}</span></div>
    <div class="label-row"><span class="lk">用途：</span><span class="lv">${esc(d.usage)}</span></div>
    <div class="label-row"><span class="lk">用法：</span><span class="lv">${esc(d.directions)}</span></div>
    <hr class="label-divider">
    <div class="label-row">
      <span class="lk">容量：</span><span class="lv">${esc(netContent)}</span>
      &emsp;<span class="lk">有效期間：</span><span class="lv">${esc(d.shelfLife)}</span>
    </div>
    <div class="label-row">
      <span class="lk">保存期限及批號：</span><span class="lv">${esc(d.expiry)}</span>
      &emsp;<span class="lk">原產地：</span><span class="lv">${esc(d.origin)}</span>
    </div>
    <div class="label-row"><span class="lk">保存方法：</span><span class="lv">${esc(d.storage)}</span></div>
    <div class="label-row"><span class="lk">使用注意事項：</span><span class="lv">${esc(d.warnings)}</span></div>
    <hr class="label-divider">
    ${mfr.name ? `<div class="label-row"><span class="lk">製造業者名稱：</span><span class="lv">${esc(mfr.name)}</span></div>` : ''}
    ${mfr.addr ? `<div class="label-row"><span class="lk">製造業者地址：</span><span class="lv">${esc(mfr.addr)}</span></div>` : ''}
    ${mfr.tel  ? `<div class="label-row"><span class="lk">製造業者電話：</span><span class="lv">${esc(mfr.tel)}</span></div>` : ''}
    <div class="label-footer">一般化妝品免字號備查｜<span style="color:#c44">紅色成分為衛福部限量標示</span></div>
  `;

  document.getElementById('labelSheet').innerHTML = html;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('labelWrapper').style.display = 'flex';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════
// COPY TEXT
// ══════════════════════════════════════════
function copyText() {
  const el = document.getElementById('labelSheet');
  if (!el || !el.innerText.trim()) { alert('請先生成標籤'); return; }
  navigator.clipboard.writeText(el.innerText).then(() => alert('已複製標籤文字'));
}
